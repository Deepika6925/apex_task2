<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <div class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>

    <div class="content">
        <h2>Main Content</h2>
        <p>This is responsive layout</p>
    </div>
</div>


<h2>Contact Form</h2>

<form id="contactForm">
    <input type="text" id="name" placeholder="Enter Name" required><br><br>

    <input type="email" id="email" placeholder="Enter Email" required><br><br>

    <textarea id="message" placeholder="Enter Message" required></textarea><br><br>

    <button type="submit">Submit</button>
</form>

<p id="error"></p>



<script src="script.js"></script>

</body>
</html>
